<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="viewport-fit=cover,width=device-width,user-scalable=no" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, sans-serif;
        color: white;

        --theme: #2589f4;
        text-align: center;
        overflow: hidden;
      }
      :root {
        background-color: #222;
        height: 100%;
      }
      body {
        max-width: 30rem;
        margin: auto;
        padding: 1rem;
        height: 100%;
      }
      main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        border: 1px solid var(--theme);
        border-radius: 0.5rem;
        padding: 0.5rem;
        height: 100%;
        table {
          width: 100%;
        }
        td {
          width: 50%;
          padding: 0.5rem;
        }
      }
      h2 {
        padding: 1rem;

        background-color: var(--theme);
        border-radius: 0.5rem;
        margin-bottom: 2rem;
      }
      a img {
        width: 100%;
      }
    </style>
    <title>고용24</title>
  </head>
  <body>
    <main>
      <section>
        <h2>고용24 출결관리</h2>
        <table>
          <tbody>
            <tr>
              <td>
                <a href="https://apps.apple.com/kr/app/id588283412">
                  <img src="./Download_on_the_App_Store_Badge_KR_RGB_wht_100317.svg" />
                </a>
              </td>
              <td>
                <a href="https://play.google.com/store/apps/details?id=kr.go.hrd.app">
                  <img src="./GetItOnGooglePlay_Badge_Web_color_Korean.svg" />
                </a>
              </td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td>아이폰</td>
              <td>안드로이드</td>
            </tr>
          </tfoot>
          <tr></tr>
        </table>
      </section>
    </main>
  </body>
</html>
